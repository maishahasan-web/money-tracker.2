<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #17171a;
    --surface2: #1e1e22;
    --border: #2a2a2f;
    --accent: #c8f06e;
    --accent2: #7c6ef7;
    --red: #f06e6e;
    --green: #6ef09a;
    --text: #f0ede8;
    --muted: #6b6b72;
    --font: 'Sora', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  /* HEADER */
  .header {
    padding: 2rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.02em; }
  .logo span { color: var(--accent); }
  .sync-status { font-size: 11px; font-family: var(--mono); color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
  .sync-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* TABS */
  .tabs { display: flex; padding: 0 1.5rem; border-bottom: 1px solid var(--border); gap: 0; }
  .tab { padding: 1rem 1.2rem; font-size: 13px; font-weight: 500; cursor: pointer; background: none; border: none; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; letter-spacing: 0.01em; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* MAIN */
  .main { max-width: 640px; margin: 0 auto; padding: 1.5rem; }
  .section { display: none; }
  .section.active { display: block; }

  /* METRICS */
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; }
  .metric-label { font-size: 11px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .metric-value { font-size: 1.3rem; font-weight: 600; font-family: var(--mono); }
  .metric-value.inc { color: var(--green); }
  .metric-value.exp { color: var(--red); }
  .metric-value.bal { color: var(--accent); }

  /* FORM */
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; }
  .type-toggle { display: flex; background: var(--surface2); border-radius: 10px; padding: 3px; margin-bottom: 1.2rem; gap: 3px; }
  .type-btn { flex: 1; padding: 8px; font-size: 13px; font-weight: 500; font-family: var(--font); cursor: pointer; border: none; border-radius: 8px; background: none; color: var(--muted); transition: all 0.15s; }
  .type-btn.active-exp { background: #2a1a1a; color: var(--red); }
  .type-btn.active-inc { background: #1a2a1f; color: var(--green); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-grid.full { grid-template-columns: 1fr; }
  .field label { display: block; font-size: 11px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .field input, .field select {
    width: 100%; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: var(--font); font-size: 14px;
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--accent2); }
  .field select option { background: var(--surface2); }
  .save-btn {
    width: 100%; padding: 12px; margin-top: 4px;
    background: var(--accent); color: #0f0f11; font-family: var(--font); font-size: 14px; font-weight: 600;
    border: none; border-radius: 10px; cursor: pointer; transition: opacity 0.15s;
  }
  .save-btn:hover { opacity: 0.88; }
  .save-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* TRANSACTION LIST */
  .tx-list { display: flex; flex-direction: column; gap: 8px; }
  .tx-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .tx-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .tx-icon.inc { background: #1a2a1f; }
  .tx-icon.exp { background: #2a1a1a; }
  .tx-info { flex: 1; min-width: 0; }
  .tx-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 11px; font-family: var(--mono); color: var(--muted); margin-top: 2px; }
  .tx-amount { font-size: 14px; font-weight: 600; font-family: var(--mono); flex-shrink: 0; }
  .tx-amount.inc { color: var(--green); }
  .tx-amount.exp { color: var(--red); }
  .tx-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 0 0 0 8px; transition: color 0.15s; flex-shrink: 0; }
  .tx-del:hover { color: var(--red); }
  .empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 13px; font-family: var(--mono); }

  /* MONTH NAV */
  .month-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 1.2rem; }
  .month-nav button { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; color: var(--muted); font-size: 16px; cursor: pointer; }
  .month-nav button:hover { color: var(--text); }
  .month-nav span { flex: 1; text-align: center; font-size: 14px; font-weight: 500; font-family: var(--mono); color: var(--accent); }

  /* CHART */
  .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.2rem; margin-bottom: 1.2rem; position: relative; height: 220px; }

  /* CATEGORY */
  .cat-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.2rem; }
  .cat-title { font-size: 11px; font-family: var(--mono); color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
  .cat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 13px; }
  .cat-name { min-width: 100px; color: var(--muted); font-family: var(--mono); font-size: 11px; }
  .cat-bar-bg { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .cat-bar { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
  .cat-amt { min-width: 80px; text-align: right; font-family: var(--mono); font-size: 12px; font-weight: 500; }

  /* TOAST */
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 20px; font-size: 13px; font-family: var(--mono); opacity: 0; transition: all 0.2s; pointer-events: none; z-index: 99; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.ok { border-color: var(--green); color: var(--green); }
  .toast.err { border-color: var(--red); color: var(--red); }

  /* LOADING */
  .loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 2rem; color: var(--muted); font-size: 13px; font-family: var(--mono); }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .metrics { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .metric:last-child { grid-column: span 2; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">money<span>.</span>tracker</div>
  <div class="sync-status">
    <div class="sync-dot online" id="sync-dot"></div>
    <span id="sync-text">connected</span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('add')">+ Add</button>
  <button class="tab" onclick="switchTab('transactions')">Transactions</button>
  <button class="tab" onclick="switchTab('summary')">Summary</button>
</div>

<div class="main">

  <!-- ADD -->
  <div id="tab-add" class="section active">
    <div class="form-card">
      <div class="type-toggle">
        <button class="type-btn active-exp" id="btn-exp" onclick="setType('expense')">↑ Expense</button>
        <button class="type-btn" id="btn-inc" onclick="setType('income')">↓ Income</button>
      </div>
      <div class="form-grid">
        <div class="field">
          <label>Description</label>
          <input type="text" id="f-desc" placeholder="e.g. Lunch, Salary...">
        </div>
        <div class="field">
          <label>Amount (৳)</label>
          <input type="number" id="f-amount" placeholder="0" min="0" step="any">
        </div>
      </div>
      <div class="form-grid">
        <div class="field">
          <label>Category</label>
          <select id="f-cat">
            <option>Food</option>
            <option>Transport</option>
            <option>Shopping</option>
            <option>Bills</option>
            <option>Health</option>
            <option>Education</option>
            <option>Entertainment</option>
            <option>Salary</option>
            <option>Freelance</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="f-date">
        </div>
      </div>
      <button class="save-btn" id="save-btn" onclick="addTx()">Save transaction</button>
    </div>
  </div>

  <!-- TRANSACTIONS -->
  <div id="tab-transactions" class="section">
    <div class="metrics" id="metrics-all"></div>
    <div id="tx-list-wrap"></div>
  </div>

  <!-- SUMMARY -->
  <div id="tab-summary" class="section">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="month-label"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="metrics" id="metrics-month"></div>
    <div class="chart-wrap">
      <canvas id="bar-chart" role="img" aria-label="Monthly income vs expense chart"></canvas>
    </div>
    <div class="cat-section">
      <div class="cat-title">Expenses by category</div>
      <div id="cat-rows"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const SUPABASE_URL = 'https://yyhiwyotmdlpwenppcuy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8U62aiKv2kmazIywDdRx-g_jiQ7hr0J';
const HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

const ICONS = { Food:'🍔', Transport:'🚌', Shopping:'🛍', Bills:'💡', Health:'💊', Education:'📚', Entertainment:'🎮', Salary:'💼', Freelance:'💻', Other:'📦' };
const CAT_COLORS = { Food:'#f06e6e', Transport:'#f0c46e', Shopping:'#7c6ef7', Bills:'#6eb4f0', Health:'#6ef09a', Education:'#c46ef0', Entertainment:'#f06ec4', Salary:'#6ef0c4', Freelance:'#6ec4f0', Other:'#6b6b72' };

let txType = 'expense';
let viewMonth = new Date();
let allTx = [];
let chartInst = null;

async function api(method, path, body) {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, { method, headers: HEADERS, body: body ? JSON.stringify(body) : undefined });
    if (!res.ok) throw new Error(await res.text());
    return method === 'DELETE' ? [] : await res.json();
  } catch(e) {
    setSyncStatus(false);
    throw e;
  }
}

function setSyncStatus(online) {
  document.getElementById('sync-dot').className = 'sync-dot' + (online ? ' online' : '');
  document.getElementById('sync-text').textContent = online ? 'connected' : 'offline';
}

function toast(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show ' + type;
  setTimeout(() => el.className = 'toast', 2500);
}

function fmtBDT(n) { return '৳' + Math.round(n).toLocaleString('en-BD'); }

function setType(t) {
  txType = t;
  document.getElementById('btn-exp').className = 'type-btn' + (t==='expense' ? ' active-exp' : '');
  document.getElementById('btn-inc').className = 'type-btn' + (t==='income' ? ' active-inc' : '');
}

async function loadAll() {
  try {
    allTx = await api('GET', 'transactions?select=*&order=date.desc,created_at.desc');
    setSyncStatus(true);
  } catch { allTx = []; }
}

async function addTx() {
  const desc = document.getElementById('f-desc').value.trim();
  const amt = parseFloat(document.getElementById('f-amount').value);
  const cat = document.getElementById('f-cat').value;
  const date = document.getElementById('f-date').value;
  if (!desc || !amt || !date) { toast('Fill all fields', 'err'); return; }
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    await api('POST', 'transactions', { type: txType, description: desc, amount: amt, category: cat, date });
    document.getElementById('f-desc').value = '';
    document.getElementById('f-amount').value = '';
    await loadAll();
    toast('Saved ✓');
  } catch { toast('Failed to save', 'err'); }
  btn.disabled = false; btn.textContent = 'Save transaction';
}

async function deleteTx(id) {
  if (!confirm('Delete this transaction?')) return;
  try {
    await api('DELETE', 'transactions?id=eq.' + id);
    await loadAll();
    renderTransactions();
    toast('Deleted');
  } catch { toast('Failed to delete', 'err'); }
}

function renderTransactions() {
  const inc = allTx.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
  const exp = allTx.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
  document.getElementById('metrics-all').innerHTML = `
    <div class="metric"><div class="metric-label">Income</div><div class="metric-value inc">${fmtBDT(inc)}</div></div>
    <div class="metric"><div class="metric-label">Expense</div><div class="metric-value exp">${fmtBDT(exp)}</div></div>
    <div class="metric"><div class="metric-label">Balance</div><div class="metric-value bal">${fmtBDT(inc-exp)}</div></div>`;
  if (!allTx.length) {
    document.getElementById('tx-list-wrap').innerHTML = '<div class="empty">no transactions yet</div>';
    return;
  }
  document.getElementById('tx-list-wrap').innerHTML = '<div class="tx-list">' + allTx.map(t => `
    <div class="tx-item">
      <div class="tx-icon ${t.type}">${ICONS[t.category]||'📦'}</div>
      <div class="tx-info">
        <div class="tx-name">${t.description}</div>
        <div class="tx-meta">${t.category} · ${t.date}</div>
      </div>
      <div class="tx-amount ${t.type}">${t.type==='income'?'+':'-'}${fmtBDT(t.amount)}</div>
      <button class="tx-del" onclick="deleteTx(${t.id})" title="Delete">×</button>
    </div>`).join('') + '</div>';
}

function changeMonth(d) { viewMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth()+d, 1); renderSummary(); }

function renderSummary() {
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const y = viewMonth.getFullYear(), m = viewMonth.getMonth();
  document.getElementById('month-label').textContent = MONTHS[m] + ' ' + y;
  const monthTx = allTx.filter(t => { const d = new Date(t.date); return d.getFullYear()===y && d.getMonth()===m; });
  const inc = monthTx.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0);
  const exp = monthTx.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);
  document.getElementById('metrics-month').innerHTML = `
    <div class="metric"><div class="metric-label">Income</div><div class="metric-value inc">${fmtBDT(inc)}</div></div>
    <div class="metric"><div class="metric-label">Expense</div><div class="metric-value exp">${fmtBDT(exp)}</div></div>
    <div class="metric"><div class="metric-label">Net</div><div class="metric-value bal">${fmtBDT(inc-exp)}</div></div>`;

  // last 6 months chart
  const labels=[], incData=[], expData=[];
  for(let i=5;i>=0;i--) {
    const d=new Date(y,m-i,1);
    labels.push(MONTHS[d.getMonth()].slice(0,3)+"'"+(d.getFullYear()+'').slice(2));
    const mt=allTx.filter(t=>{const dd=new Date(t.date);return dd.getFullYear()===d.getFullYear()&&dd.getMonth()===d.getMonth();});
    incData.push(mt.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0));
    expData.push(mt.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0));
  }
  if(chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById('bar-chart'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Income',data:incData,backgroundColor:'#6ef09a44',borderColor:'#6ef09a',borderWidth:1.5,borderRadius:4},
      {label:'Expense',data:expData,backgroundColor:'#f06e6e44',borderColor:'#f06e6e',borderWidth:1.5,borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
      x:{ticks:{color:'#6b6b72',font:{family:"'DM Mono', monospace",size:11},autoSkip:false},grid:{color:'#2a2a2f'}},
      y:{ticks:{color:'#6b6b72',font:{family:"'DM Mono', monospace",size:11},callback:v=>'৳'+v.toLocaleString()},grid:{color:'#2a2a2f'}}
    }}
  });

  const cats={};
  monthTx.filter(t=>t.type==='expense').forEach(t=>{cats[t.category]=(cats[t.category]||0)+Number(t.amount);});
  const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const max=sorted[0]?sorted[0][1]:1;
  document.getElementById('cat-rows').innerHTML = sorted.length ? sorted.map(([cat,amt])=>`
    <div class="cat-row">
      <div class="cat-name">${cat}</div>
      <div class="cat-bar-bg"><div class="cat-bar" style="width:${Math.round(amt/max*100)}%;background:${CAT_COLORS[cat]||'#7c6ef7'}"></div></div>
      <div class="cat-amt" style="color:${CAT_COLORS[cat]||'#7c6ef7'}">${fmtBDT(amt)}</div>
    </div>`).join('') : '<div style="color:#6b6b72;font-size:13px;font-family:var(--mono)">no expenses this month</div>';
}

async function switchTab(t) {
  document.querySelectorAll('.tab').forEach((el,i)=>{el.classList.toggle('active',['add','transactions','summary'][i]===t)});
  document.querySelectorAll('.section').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='transactions'||t==='summary') {
    document.getElementById(t==='transactions'?'tx-list-wrap':'cat-rows').innerHTML='<div class="loading"><div class="spinner"></div>Loading...</div>';
    await loadAll();
    if(t==='transactions') renderTransactions();
    if(t==='summary') renderSummary();
  }
}

// init
document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
loadAll();
</script>
</body>
</html>
