<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0e0f11"/>
<title>Money Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0e0f11;
    --surface: #16181c;
    --surface2: #1e2026;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0f0ee;
    --muted: #7a7d85;
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.12);
    --green-border: rgba(74,222,128,0.25);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --red-border: rgba(248,113,113,0.25);
    --accent: #c8f55a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }

  /* ── AUTH ── */
  #auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px 16px; }
  .auth-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 20px; padding: 36px 28px; width: 100%; max-width: 400px; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
  .auth-logo { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 28px; }
  .auth-logo-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; }
  .auth-title { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 4px; }
  .auth-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; font-family: 'DM Mono', monospace; }
  .auth-error { background: var(--red-dim); border: 1px solid var(--red-border); color: var(--red); border-radius: 10px; padding: 10px 14px; font-size: 12px; font-family: 'DM Mono', monospace; margin-bottom: 16px; display: none; }
  .auth-success { background: var(--green-dim); border: 1px solid var(--green-border); color: var(--green); border-radius: 10px; padding: 10px 14px; font-size: 12px; font-family: 'DM Mono', monospace; margin-bottom: 16px; display: none; }
  .auth-field { margin-bottom: 14px; }
  .auth-field-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 0.04em; margin-bottom: 6px; display: block; }
  .auth-input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 15px; padding: 12px 14px; outline: none; transition: border-color 0.15s; height: 48px; }
  .auth-input:focus { border-color: var(--accent); }
  .auth-input::placeholder { color: var(--muted); }
  .auth-btn { width: 100%; background: var(--accent); color: #0e0f11; border: none; border-radius: 12px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; height: 52px; cursor: pointer; margin-top: 6px; letter-spacing: -0.01em; transition: opacity 0.15s; }
  .auth-btn:hover { opacity: 0.9; }
  .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .auth-switch { text-align: center; margin-top: 20px; font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .auth-switch-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 12px; font-family: 'DM Mono', monospace; font-weight: 500; }

  /* ── APP ── */
  #app-screen { display: none; }
  header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 16px 20px 14px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .logo { font-size: 17px; font-weight: 700; letter-spacing: -0.02em; display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .user-badge { display: flex; align-items: center; gap: 7px; background: var(--surface); border: 1px solid var(--border2); border-radius: 30px; padding: 5px 12px 5px 6px; font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); }
  .user-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--accent); color: #0e0f11; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; }
  .logout-btn { background: none; border: none; color: var(--muted); font-size: 11px; font-family: 'DM Mono', monospace; cursor: pointer; padding: 0; transition: color 0.15s; }
  .logout-btn:hover { color: var(--red); }
  .header-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  main { padding: 20px 16px 100px; max-width: 480px; margin: 0 auto; }
  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 12px; }
  .metric-card.income { border-color: var(--green-border); }
  .metric-card.expense { border-color: var(--red-border); }
  .metric-card.balance { border-color: rgba(200,245,90,0.25); }
  .metric-label { font-size: 10px; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 6px; font-family: 'DM Mono', monospace; }
  .metric-value { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; font-family: 'DM Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .metric-card.income .metric-value { color: var(--green); }
  .metric-card.expense .metric-value { color: var(--red); }
  .metric-card.balance .metric-value { color: var(--accent); }
  .input-section { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px 16px; margin-bottom: 16px; }
  .input-section-title { font-size: 11px; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 14px; }
  .field-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; font-family: 'DM Mono', monospace; letter-spacing: 0.04em; }
  .field { margin-bottom: 12px; }
  input[type="text"], input[type="number"] { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 16px; padding: 12px 14px; outline: none; transition: border-color 0.15s; appearance: none; -webkit-appearance: none; height: 48px; }
  input[type="text"]::placeholder, input[type="number"]::placeholder { color: var(--muted); }
  input:focus { border-color: var(--accent); }
  .type-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .type-btn { height: 48px; border-radius: 12px; border: 1px solid var(--border2); background: var(--surface2); color: var(--muted); font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .type-btn.active-income { background: var(--green-dim); border-color: var(--green-border); color: var(--green); }
  .type-btn.active-expense { background: var(--red-dim); border-color: var(--red-border); color: var(--red); }
  .add-btn { width: 100%; background: var(--accent); color: #0e0f11; border: none; border-radius: 12px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; height: 52px; cursor: pointer; transition: opacity 0.15s, transform 0.1s; margin-top: 4px; letter-spacing: -0.01em; }
  .add-btn:active { opacity: 0.85; transform: scale(0.98); }
  .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px 16px; margin-bottom: 16px; }
  .panel-title { font-size: 11px; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 14px; }
  .tx-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); gap: 8px; }
  .tx-item:last-child { border-bottom: none; }
  .tx-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .tx-icon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; font-family: 'DM Mono', monospace; flex-shrink: 0; }
  .tx-icon.income { background: var(--green-dim); color: var(--green); }
  .tx-icon.expense { background: var(--red-dim); color: var(--red); }
  .tx-info { min-width: 0; }
  .tx-desc { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-time { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .tx-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .tx-amount { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; }
  .tx-amount.income { color: var(--green); }
  .tx-amount.expense { color: var(--red); }
  .del-btn { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; cursor: pointer; color: var(--muted); font-size: 16px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; transition: all 0.1s; flex-shrink: 0; }
  .del-btn:active { background: var(--red-dim); color: var(--red); border-color: var(--red-border); }
  .empty-state { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; text-align: center; padding: 20px 0; }
  .chart-wrap { position: relative; height: 180px; }
  .legend { display: flex; gap: 16px; font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 14px; }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .legend-sq { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
  .savings-bar-wrap { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
  .savings-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-bottom: 8px; }
  .savings-bar-track { background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; }
  .savings-bar-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.4s ease; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 10px 18px; font-size: 13px; font-family: 'DM Mono', monospace; color: var(--text); opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 99; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); display: inline-block; margin-left: 6px; }
  .status-dot.online { background: var(--green); }
  .status-dot.error { background: var(--red); }
</style>
</head>
<body>

<!-- ══ AUTH SCREEN ══ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo"><span class="auth-logo-dot"></span>Money Tracker</div>
    <div class="auth-title" id="auth-title">Sign in</div>
    <div class="auth-sub" id="auth-sub">welcome back — your taka is waiting</div>
    <div class="auth-error" id="auth-error"></div>
    <div class="auth-success" id="auth-success"></div>

    <div id="login-fields">
      <div class="auth-field">
        <label class="auth-field-label">Email</label>
        <input class="auth-input" type="text" id="login-email" placeholder="you@email.com" />
      </div>
      <div class="auth-field">
        <label class="auth-field-label">Password</label>
        <input class="auth-input" type="password" id="login-pass" placeholder="••••••••" />
      </div>
      <button class="auth-btn" id="login-btn" onclick="handleLogin()">Sign In →</button>
    </div>

    <div id="reg-fields" style="display:none">
      <div class="auth-field">
        <label class="auth-field-label">Email</label>
        <input class="auth-input" type="text" id="reg-email" placeholder="you@email.com" />
      </div>
      <div class="auth-field">
        <label class="auth-field-label">Password</label>
        <input class="auth-input" type="password" id="reg-pass" placeholder="min. 6 characters" />
      </div>
      <button class="auth-btn" id="reg-btn" onclick="handleRegister()">Create Account →</button>
    </div>

    <div class="auth-switch">
      <span id="switch-text">No account? </span>
      <button class="auth-switch-btn" onclick="toggleMode()">Register</button>
    </div>
  </div>
</div>

<!-- ══ APP SCREEN ══ -->
<div id="app-screen">
  <header>
    <div class="logo"><span class="logo-dot"></span>Money Tracker <span class="status-dot" id="status-dot"></span></div>
    <div class="header-right">
      <div class="user-badge">
        <div class="user-avatar" id="user-avatar">?</div>
        <span id="user-label">user</span>
        <button class="logout-btn" onclick="handleLogout()">sign out</button>
      </div>
    </div>
  </header>

  <main>
    <div class="metrics">
      <div class="metric-card income"><div class="metric-label">Income</div><div class="metric-value" id="m-income">৳0</div></div>
      <div class="metric-card expense"><div class="metric-label">Spent</div><div class="metric-value" id="m-expense">৳0</div></div>
      <div class="metric-card balance"><div class="metric-label">Balance</div><div class="metric-value" id="m-balance">৳0</div></div>
    </div>

    <div class="input-section">
      <div class="input-section-title">New transaction</div>
      <div class="field"><div class="field-label">Description</div><input type="text" id="inp-desc" placeholder="e.g. Salary, Groceries..." autocomplete="off"/></div>
      <div class="field"><div class="field-label">Amount (৳)</div><input type="number" id="inp-amount" placeholder="0" min="0" inputmode="decimal"/></div>
      <div class="field">
        <div class="field-label">Type</div>
        <div class="type-toggle">
          <button class="type-btn active-income" id="btn-income" onclick="setType('income')">+ Income</button>
          <button class="type-btn" id="btn-expense" onclick="setType('expense')">- Expense</button>
        </div>
      </div>
      <button class="add-btn" id="add-btn" onclick="addEntry()">Add transaction</button>
    </div>

    <div class="panel">
      <div class="panel-title">Overview</div>
      <div class="legend">
        <span><span class="legend-sq" style="background:#4ade80;"></span>Income</span>
        <span><span class="legend-sq" style="background:#f87171;"></span>Expenses</span>
      </div>
      <div class="chart-wrap"><canvas id="myChart"></canvas></div>
      <div class="savings-bar-wrap">
        <div class="savings-bar-label"><span>Savings rate</span><span id="savings-pct">0%</span></div>
        <div class="savings-bar-track"><div class="savings-bar-fill" id="savings-bar" style="width:0%;"></div></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">Transactions</div>
      <div id="tx-list"><div class="empty-state">Loading...</div></div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const SUPABASE_URL = 'https://yyhiwyotmdlpwenppcuy.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5aGl3eW90bWRscHdlbnBwY3V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MDM4NTUsImV4cCI6MjA5MTk3OTg1NX0.9g-vKGUGfi4G6IIScq8XtMk-Gev3s27UGpFIWeRr6VY';

  let entries = [], selectedType = 'income', chart, authMode = 'login', currentSession = null;

  // ── Toast ──
  function showToast(msg, dur = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
  }
  function setStatus(s) { document.getElementById('status-dot').className = 'status-dot ' + s; }

  // ── Auth UI ──
  function toggleMode() {
    authMode = authMode === 'login' ? 'register' : 'login';
    const il = authMode === 'login';
    document.getElementById('auth-title').textContent = il ? 'Sign in' : 'Create account';
    document.getElementById('auth-sub').textContent = il ? 'welcome back — your taka is waiting' : 'start tracking your personal taka';
    document.getElementById('login-fields').style.display = il ? '' : 'none';
    document.getElementById('reg-fields').style.display = il ? 'none' : '';
    document.getElementById('switch-text').textContent = il ? 'No account? ' : 'Already have an account? ';
    document.querySelector('.auth-switch-btn').textContent = il ? 'Register' : 'Sign in';
    hideMsg();
  }

  function showErr(msg) { const e = document.getElementById('auth-error'); e.textContent = msg; e.style.display = 'block'; document.getElementById('auth-success').style.display = 'none'; }
  function showOk(msg) { const e = document.getElementById('auth-success'); e.textContent = msg; e.style.display = 'block'; document.getElementById('auth-error').style.display = 'none'; }
  function hideMsg() { document.getElementById('auth-error').style.display = 'none'; document.getElementById('auth-success').style.display = 'none'; }

  // ── Login ──
  async function handleLogin() {
    hideMsg();
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-pass').value;
    if (!email || !password) return showErr('Please fill all fields.');
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Signing in...';
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error_description || data.msg || 'Login failed');
      loginSuccess(data);
    } catch(e) { showErr(e.message); }
    btn.disabled = false; btn.textContent = 'Sign In →';
  }

  // ── Register ──
  async function handleRegister() {
    hideMsg();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-pass').value;
    if (!email || !password) return showErr('Please fill all fields.');
    if (password.length < 6) return showErr('Password must be at least 6 characters.');
    const btn = document.getElementById('reg-btn');
    btn.disabled = true; btn.textContent = 'Creating account...';
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error_description || data.msg || 'Registration failed');
      if (data.access_token) {
        loginSuccess(data);
      } else {
        // Email confirmation required
        toggleMode();
        showOk('✓ Account created! Check your email to confirm, then sign in.');
      }
    } catch(e) { showErr(e.message); }
    btn.disabled = false; btn.textContent = 'Create Account →';
  }

  function loginSuccess(sessionData) {
    currentSession = sessionData;
    localStorage.setItem('mt_session', JSON.stringify({
      access_token: sessionData.access_token,
      refresh_token: sessionData.refresh_token,
      user: sessionData.user
    }));
    const email = sessionData.user.email;
    document.getElementById('user-avatar').textContent = email[0].toUpperCase();
    document.getElementById('user-label').textContent = email.length > 20 ? email.substring(0,18)+'…' : email;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    loadEntries();
  }

  function handleLogout() {
    currentSession = null; entries = [];
    localStorage.removeItem('mt_session');
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('login-email').value = '';
    document.getElementById('login-pass').value = '';
    if (authMode !== 'login') toggleMode();
    if (chart) { chart.destroy(); chart = null; }
  }

  function authH() {
    return { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + currentSession.access_token };
  }

  // ── Data ──
  async function loadEntries() {
    try {
      const userId = currentSession.user.id;
      const res = await fetch(`${SUPABASE_URL}/rest/v1/transactions?user_id=eq.${userId}&order=created_at.desc`, { headers: authH() });
      if (!res.ok) throw new Error();
      entries = await res.json();
      setStatus('online'); render();
    } catch(e) {
      setStatus('error');
      showToast('⚠️ Could not load data.');
      document.getElementById('tx-list').innerHTML = '<div class="empty-state">Could not connect to database.</div>';
    }
  }

  function setType(t) {
    selectedType = t;
    document.getElementById('btn-income').className = 'type-btn' + (t==='income'?' active-income':'');
    document.getElementById('btn-expense').className = 'type-btn' + (t==='expense'?' active-expense':'');
  }

  async function addEntry() {
    const desc = document.getElementById('inp-desc').value.trim();
    const amount = parseFloat(document.getElementById('inp-amount').value);
    if (!desc || isNaN(amount) || amount <= 0) { document.getElementById(!desc?'inp-desc':'inp-amount').focus(); return; }
    const btn = document.getElementById('add-btn');
    btn.disabled = true; btn.textContent = 'Saving...';
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/transactions`, {
        method: 'POST',
        headers: { ...authH(), 'Prefer': 'return=representation' },
        body: JSON.stringify({ description: desc, amount, type: selectedType })
      });
      if (!res.ok) throw new Error();
      const [newEntry] = await res.json();
      entries.unshift(newEntry);
      document.getElementById('inp-desc').value = '';
      document.getElementById('inp-amount').value = '';
      document.getElementById('inp-desc').focus();
      showToast('✅ Transaction saved!');
      render();
    } catch(e) { showToast('❌ Failed to save. Try again.'); }
    btn.disabled = false; btn.textContent = 'Add transaction';
  }

  async function deleteEntry(id) {
    if (!confirm('Delete this entry?')) return;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/transactions?id=eq.${id}&user_id=eq.${currentSession.user.id}`, { method: 'DELETE', headers: authH() });
      if (!res.ok) throw new Error();
      entries = entries.filter(e => e.id !== id);
      showToast('🗑️ Deleted'); render();
    } catch(e) { showToast('❌ Failed to delete.'); }
  }

  function fmt(n) {
    if (n >= 100000) return '৳' + (n/100000).toFixed(1) + 'L';
    if (n >= 1000) return '৳' + (n/1000).toFixed(1) + 'K';
    return '৳' + Math.abs(n).toLocaleString('en-IN', { maximumFractionDigits: 0 });
  }
  function fmtFull(n) { return '৳' + Math.abs(n).toLocaleString('en-IN', { maximumFractionDigits: 0 }); }
  function timeLabel(ts) { const d = new Date(ts); return d.toLocaleString('en-BD', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }); }
  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function render() {
    const income = entries.filter(e=>e.type==='income').reduce((s,e)=>s+e.amount,0);
    const expense = entries.filter(e=>e.type==='expense').reduce((s,e)=>s+e.amount,0);
    const balance = income - expense;
    document.getElementById('m-income').textContent = fmt(income);
    document.getElementById('m-expense').textContent = fmt(expense);
    const balEl = document.getElementById('m-balance');
    balEl.textContent = (balance<0?'-':'') + fmt(Math.abs(balance));
    balEl.style.color = balance>=0 ? '#c8f55a' : '#f87171';
    const rate = income>0 ? Math.max(0,Math.min(100,Math.round((balance/income)*100))) : 0;
    document.getElementById('savings-pct').textContent = rate + '%';
    document.getElementById('savings-bar').style.width = rate + '%';
    const list = document.getElementById('tx-list');
    list.innerHTML = entries.length === 0
      ? '<div class="empty-state">No entries yet.</div>'
      : entries.map(e => `
        <div class="tx-item">
          <div class="tx-left">
            <div class="tx-icon ${e.type}">${e.type==='income'?'+':'-'}</div>
            <div class="tx-info">
              <div class="tx-desc">${escHtml(e.description)}</div>
              <div class="tx-time">${timeLabel(e.created_at)}</div>
            </div>
          </div>
          <div class="tx-right">
            <span class="tx-amount ${e.type}">${e.type==='income'?'+':'-'}${fmtFull(e.amount)}</span>
            <button class="del-btn" onclick="deleteEntry('${e.id}')">×</button>
          </div>
        </div>`).join('');
    updateChart(income, expense);
  }

  function updateChart(income, expense) {
    const ctx = document.getElementById('myChart').getContext('2d');
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Income', 'Expenses'],
        datasets: [{ data: [income, expense], backgroundColor: ['rgba(74,222,128,0.2)','rgba(248,113,113,0.2)'], borderColor: ['#4ade80','#f87171'], borderWidth: 1.5, borderRadius: 8, borderSkipped: false }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color:'#7a7d85', font:{family:'DM Mono',size:11} }, grid:{display:false}, border:{color:'rgba(255,255,255,0.07)'} },
          y: { ticks: { color:'#7a7d85', font:{family:'DM Mono',size:10}, callback: v=>'৳'+(v>=1000?(v/1000).toFixed(0)+'K':v) }, grid:{color:'rgba(255,255,255,0.05)'}, border:{display:false}, beginAtZero:true }
        }
      }
    });
  }

  // keyboard
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('auth-screen').style.display !== 'none')
      authMode === 'login' ? handleLogin() : handleRegister();
  });
  document.getElementById('inp-desc').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('inp-amount').focus(); });
  document.getElementById('inp-amount').addEventListener('keydown', e => { if(e.key==='Enter') addEntry(); });

  // ── Restore session on load ──
  (function() {
    try {
      const saved = localStorage.getItem('mt_session');
      if (saved) {
        const s = JSON.parse(saved);
        if (s.access_token && s.user) { currentSession = s; loginSuccess(s); return; }
      }
    } catch(e) {}
  })();
</script>
</body>
</html>
